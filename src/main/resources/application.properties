# ============================================================
# MEPHAR - Pharmacy Management System Configuration
# ============================================================
# Environment: dev | staging | prod
app.env=dev
app.name=MEPHAR
app.version=1.0.0

# ============================================================
# Database Configuration
# ============================================================
db.url=jdbc:sqlserver://localhost:1433;databaseName=CuaHangThuoc_Batch;encrypt=false;trustServerCertificate=true;characterEncoding=UTF-8;sendStringParametersAsUnicode=true;useUnicode=true;
db.user=sa
db.password=123456
db.driver=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Connection Pool (HikariCP)
db.pool.minimumIdle=2
db.pool.maximumPoolSize=10
db.pool.connectionTimeout=5000
db.pool.idleTimeout=300000
db.pool.maxLifetime=600000

# Fallback server names (comma-separated, tried in order)
db.serverNames=localhost,localhost\\MSSQLSERVER02,GIABAO123\\MSSQLSERVER02

# ============================================================
# Logging
# ============================================================
log.level=INFO
log.file=logs/mephar.log
log.console=true

# ============================================================
# Business Rules
# ============================================================
stock.warningThresholdDays=30
stock.fefoEnabled=true
invoice.prefix=HD
receipt.prefix=PN
